name: Build Android SDK for Godot 4.7

on:
  workflow_dispatch:

jobs:
  build-sdk:
    runs-on: ubuntu-latest

    env:
      GODOT_SDK: ${{ github.workspace }}/godot-sdk

    steps:
      - uses: actions/checkout@v4

      - name: Install Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Setup Android tools
        uses: android-actions/setup-android@v3

      - name: Create empty SDK
        run: |
          rm -rf "$GODOT_SDK"
          mkdir -p "$GODOT_SDK"

      - name: Accept licenses
        run: |
          yes | sdkmanager --sdk_root="$GODOT_SDK" --licenses

      - name: Install only Godot packages
        run: |
          sdkmanager --sdk_root="$GODOT_SDK" \
            "platform-tools" \
            "build-tools;35.0.1" \
            "platforms;android-35" \
            "cmdline-tools;latest" \
            "cmake;3.10.2.4988404" \
            "ndk;28.1.13356709"

      - name: Show installed packages
        run: |
          sdkmanager --sdk_root="$GODOT_SDK" --list_installed

      - name: Show directory tree
        run: |
          find "$GODOT_SDK" -maxdepth 2

      - name: Archive SDK
        run: |
          cd "${{ github.workspace }}"
          tar -cf godot-sdk.tar godot-sdk

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: godot-sdk
          path: godot-sdk.tar
